<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figma Design Lint — __TITLE__ (Summary)</title>
    <style>
      :root {
        --p0: #dc2626;
        --p0-bg: rgba(220, 38, 38, 0.12);
        --p1: #ea580c;
        --p1-bg: rgba(234, 88, 12, 0.12);
        --p2: #ca8a04;
        --p2-bg: rgba(202, 138, 4, 0.12);
        --p3: #6b7280;
        --p3-bg: rgba(107, 114, 128, 0.1);
        --pass: #16a34a;
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface2: #232733;
        --text: #e4e4e7;
        --text2: #a1a1aa;
        --border: #2e3240;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 32px;
      }
      .report-header {
        margin-bottom: 32px;
      }
      .report-header h1 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .report-header .meta {
        font-size: 13px;
        color: var(--text2);
      }
      .report-header .meta a {
        color: #60a5fa;
        text-decoration: none;
      }

      /* Score card */
      .score-card {
        display: flex;
        align-items: center;
        gap: 24px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 32px;
      }
      .score-ring {
        width: 80px;
        height: 80px;
        position: relative;
      }
      .score-ring svg {
        transform: rotate(-90deg);
      }
      .score-ring .value {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 800;
      }
      .score-stats {
        display: flex;
        gap: 20px;
      }
      .stat {
        text-align: center;
      }
      .stat .num {
        font-size: 20px;
        font-weight: 700;
      }
      .stat .label {
        font-size: 11px;
        color: var(--text2);
        margin-top: 2px;
      }
      .verdict {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        margin-top: 8px;
      }
      .verdict.not-ready {
        background: rgba(220, 38, 38, 0.15);
        color: #fca5a5;
      }
      .verdict.needs-work {
        background: rgba(234, 88, 12, 0.15);
        color: #fdba74;
      }
      .verdict.ready {
        background: rgba(22, 163, 74, 0.15);
        color: #86efac;
      }

      /* Page cards grid */
      .section-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }
      .page-grid {
        display: flex;
        flex-direction: column;
        gap: 0;
        margin-bottom: 32px;
      }
      .page-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 12px;
      }
      .page-card-summary {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px;
        cursor: pointer;
        transition: background 0.15s;
        user-select: none;
      }
      .page-card-summary:hover {
        background: var(--surface2);
      }
      .page-card-summary .chevron {
        font-size: 14px;
        color: var(--text2);
        transition: transform 0.2s;
        flex-shrink: 0;
      }
      .page-card.open .page-card-summary .chevron {
        transform: rotate(90deg);
      }
      .page-card-header {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        min-width: 0;
      }
      .page-mini-score {
        font-size: 24px;
        font-weight: 800;
        min-width: 40px;
      }
      .page-info {
        flex: 1;
        min-width: 0;
      }
      .page-name {
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .page-id {
        font-size: 11px;
        color: var(--text2);
      }
      .page-card .verdict {
        margin-top: 0;
        font-size: 11px;
        padding: 2px 8px;
      }
      .page-card-stats {
        display: flex;
        gap: 12px;
        font-size: 11px;
        color: var(--text2);
      }
      .page-card-stats span {
        padding: 2px 6px;
        border-radius: 3px;
      }
      .stat-p0 {
        background: var(--p0-bg);
        color: var(--p0);
        font-weight: 600;
      }
      .stat-p1 {
        background: var(--p1-bg);
        color: var(--p1);
        font-weight: 600;
      }
      .stat-p2 {
        background: var(--p2-bg);
        color: var(--p2);
      }
      .stat-p3 {
        background: var(--p3-bg);
        color: var(--p3);
      }

      /* Page detail panel (expandable) */
      .page-detail {
        display: none;
        padding: 0 16px 16px;
        border-top: 1px solid var(--border);
      }
      .page-card.open .page-detail {
        display: block;
      }
      .page-detail .cat-table {
        width: 100%;
        border-collapse: collapse;
        margin: 12px 0;
        font-size: 13px;
      }
      .page-detail .cat-table th {
        text-align: left;
        padding: 6px 10px;
        border-bottom: 2px solid var(--border);
        color: var(--text2);
        font-weight: 500;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .page-detail .cat-table td {
        padding: 6px 10px;
        border-bottom: 1px solid var(--border);
      }
      .page-detail .issue {
        background: var(--surface2);
      }
      .page-detail .positives {
        background: rgba(22, 163, 74, 0.08);
        border: 1px solid rgba(22, 163, 74, 0.25);
        border-radius: 8px;
        padding: 12px;
        margin: 12px 0;
      }
      .page-detail .positives h3 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #86efac;
      }
      .page-detail .positives li {
        font-size: 12px;
        line-height: 1.6;
        color: var(--text2);
        margin-left: 16px;
      }
      .status-pass { color: var(--pass); }
      .status-warn { color: var(--p2); }
      .status-fail { color: var(--p0); }

      /* Cross-page issues */
      .cross-issues {
        margin-bottom: 32px;
      }
      .issue {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 12px;
      }
      .issue-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .issue-sev {
        font-size: 11px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 4px;
        color: #fff;
      }
      .issue-sev.p0 {
        background: var(--p0);
      }
      .issue-sev.p1 {
        background: var(--p1);
      }
      .issue-sev.p2 {
        background: var(--p2);
      }
      .issue-sev.p3 {
        background: var(--p3);
      }
      .issue-title {
        font-weight: 600;
        font-size: 14px;
      }
      .issue-cat {
        font-size: 11px;
        color: var(--text2);
        margin-left: auto;
      }
      .issue-body {
        font-size: 13px;
        color: var(--text2);
        line-height: 1.6;
      }
      .issue-body strong {
        color: var(--text);
      }
      .issue-body code {
        background: var(--surface2);
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 12px;
      }
      .issue-fix {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--border);
        font-size: 12px;
        color: #86efac;
      }
      .issue-pages {
        margin-top: 6px;
        font-size: 11px;
        color: var(--text2);
      }
      .issue-pages span {
        background: var(--surface2);
        padding: 1px 6px;
        border-radius: 3px;
        margin-right: 4px;
      }

      /* Systemic */
      .systemic {
        margin-bottom: 32px;
      }
      .systemic-item {
        background: var(--surface);
        border-left: 3px solid var(--p1);
        padding: 12px 16px;
        margin-bottom: 8px;
        border-radius: 0 8px 8px 0;
      }
      .systemic-item h4 {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .systemic-item p {
        font-size: 12px;
        color: var(--text2);
        line-height: 1.5;
      }

      /* Checklist */
      .checklist {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 32px;
      }
      .checklist h2 {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 12px;
      }
      .check-item {
        padding: 6px 0;
        font-size: 13px;
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }
      .check-item .sev {
        font-size: 10px;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 3px;
        color: #fff;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .check-item .scope {
        font-size: 10px;
        color: var(--text2);
        background: var(--surface2);
        padding: 1px 5px;
        border-radius: 3px;
        flex-shrink: 0;
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <div class="report-header">
      <h1>Figma Design Lint — Multi-Page Summary</h1>
      <div class="meta">__META__</div>
    </div>

    <div class="score-card">
      <div class="score-ring">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <circle cx="40" cy="40" r="34" fill="none" stroke="#2e3240" stroke-width="6" />
          <circle
            cx="40"
            cy="40"
            r="34"
            fill="none"
            stroke="__SCORE_COLOR__"
            stroke-width="6"
            stroke-dasharray="213.6"
            stroke-dashoffset="__OFFSET__"
            stroke-linecap="round"
          />
        </svg>
        <div class="value" style="color: __SCORE_COLOR__">__OVERALL_SCORE__</div>
      </div>
      <div>
        <div class="score-stats">
          <div class="stat">
            <div class="num" style="color: var(--p0)">__TOTAL_P0__</div>
            <div class="label">P0</div>
          </div>
          <div class="stat">
            <div class="num" style="color: var(--p1)">__TOTAL_P1__</div>
            <div class="label">P1</div>
          </div>
          <div class="stat">
            <div class="num" style="color: var(--p2)">__TOTAL_P2__</div>
            <div class="label">P2</div>
          </div>
          <div class="stat">
            <div class="num" style="color: var(--p3)">__TOTAL_P3__</div>
            <div class="label">P3</div>
          </div>
        </div>
        <div class="verdict __VERDICT_CLASS__">__VERDICT__</div>
      </div>
    </div>

    <h2 class="section-title">Pages Audited</h2>
    <div class="page-grid">__PAGE_CARDS__</div>

    <div class="cross-issues">
      <h2 class="section-title">Cross-Page Issues</h2>
      __CROSS_ISSUES__
    </div>

    __SYSTEMIC__ __CHECKLIST__
    <script>
      document.querySelectorAll('.page-card-summary').forEach(s => {
        s.addEventListener('click', () => s.closest('.page-card').classList.toggle('open'));
      });
    </script>
  </body>
</html>
